# ═══════════════════════════════════════════════════════════════
# Crowny Platform — nginx reverse proxy (단일 서버)
#
# crownybus.com → CrownyTVM (:7730)
# crowny.org    → CrownyTVM (:7730)
#
# CrownyOS Rust 서버 (17777) 의존성 제거 완료
# 모든 /v2/ API는 CrownyTVM에서 직접 처리
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /opt/homebrew/var/log/nginx/error.log warn;
pid /opt/homebrew/var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_host"';
    access_log /opt/homebrew/var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # HTTP → HTTPS
    server {
        listen 8080;
        server_name crownybus.com crowny.org;
        location /.well-known/acme-challenge/ { root /opt/homebrew/var/www/letsencrypt; }
        location / { return 301 https://$host$request_uri; }
    }

    # HTTPS — 양 도메인 모두 CrownyTVM
    server {
        listen 8443 ssl;
        http2 on;
        server_name crownybus.com crowny.org;

        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        client_max_body_size 50M;

        location / {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
