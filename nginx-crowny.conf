# ═══════════════════════════════════════════════════════════════
# Crowny Platform — nginx reverse proxy (dual domain)
#
# 구조:
#   인터넷 → 공유기(:443,:80) → nginx(:8443,:8080) → backend
#     crownybus.com → CrownyOS  (:17777)
#     crowny.org    → CrownyTVM (:7730)
#
# 설치:
#   1. brew install nginx certbot (macOS)
#   2. cp nginx-crowny.conf /opt/homebrew/etc/nginx/nginx.conf
#   3. 공유기 포트포워딩: 443→8443, 80→8080
#   4. nginx
#   5. certbot certonly --webroot -w /opt/homebrew/var/www/letsencrypt \
#        -d crownybus.com -d crowny.org
#   6. nginx -s reload
#
# DNS (hosting.kr, NS를 hosting.co.kr로 복원 후):
#   crownybus.com  A  112.144.147.144
#   crowny.org     A  112.144.147.144
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /opt/homebrew/var/log/nginx/error.log warn;
pid /opt/homebrew/var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_host"';
    access_log /opt/homebrew/var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ─── HTTP (포트 8080) ───
    # ACME 챌린지 + HTTPS 리다이렉트
    server {
        listen 8080;
        server_name crownybus.com crowny.org;

        # Let's Encrypt ACME 챌린지
        location /.well-known/acme-challenge/ {
            root /opt/homebrew/var/www/letsencrypt;
        }

        # 나머지는 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS: crownybus.com → CrownyOS (:17777) ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crownybus.com;

        # SSL — Let's Encrypt (crownybus.com + crowny.org)
        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 보안 헤더
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # 모든 요청 → CrownyOS REST (HTTP)
        location / {
            proxy_pass http://127.0.0.1:17777;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;

            # OAuth 버튼 제거 (Google, Kakao, GitHub)
            sub_filter_once off;
            # sub_filter applies to text/html by default
            sub_filter "onclick=\"oauthLogin('google')\"" "onclick=\"alert('Google 로그인은 지원되지 않습니다')\" disabled";
            sub_filter "onclick=\"oauthLogin('kakao')\"" "onclick=\"alert('Kakao 로그인은 지원되지 않습니다')\" disabled";
            sub_filter "onclick=\"oauthLogin('github')\"" "onclick=\"alert('GitHub 로그인은 지원되지 않습니다')\" disabled";
            sub_filter "Google 계정으로 로그인" "지원 종료";
            sub_filter "GitHub 계정으로 로그인" "지원 종료";
            sub_filter "<span style=\"font-size:16px\">🔵</span> 지원 종료" "<span style=\"font-size:16px\">🚫</span> Google 지원 종료";
            sub_filter "<span style=\"font-size:16px\">🐙</span> 지원 종료" "<span style=\"font-size:16px\">🚫</span> GitHub 지원 종료";
        }
    }

    # ─── HTTPS: crowny.org → CrownyTVM (:7730) ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crowny.org;

        # SSL — Let's Encrypt (crownybus.com + crowny.org)
        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 보안 헤더
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # API → CrownyTVM Node.js
        location /api/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket (채팅 실시간)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # 정적 파일 → CrownyTVM
        location / {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
