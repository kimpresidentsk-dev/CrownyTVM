# ═══════════════════════════════════════════════════════════════
# Crowny Platform — nginx reverse proxy
#
# crownybus.com = Enterprise (CrownyOS Canvas :17777)
#   + 공유 API (인증/메신저/지갑/체인) → CrownyTVM :7730
# crowny.org = Consumer (CrownyTVM :7730)
#
# 원칙: 데이터는 CrownyTVM이 관리, GUI는 각자
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /opt/homebrew/var/log/nginx/error.log warn;
pid /opt/homebrew/var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_host"';
    access_log /opt/homebrew/var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ─── HTTP → HTTPS ───
    server {
        listen 8080;
        server_name crownybus.com crowny.org;
        location /.well-known/acme-challenge/ { root /opt/homebrew/var/www/letsencrypt; }
        location / { return 301 https://$host$request_uri; }
    }

    # ─── crownybus.com: Enterprise (CrownyOS + 공유 API) ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crownybus.com;

        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        client_max_body_size 50M;

        # ── 공유 데이터 API → CrownyTVM (:7730) ──
        # 인증
        location /api/login    { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/register { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/profile  { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /v2/auth/me   { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # 메신저 (/v2/ 호환)
        location /v2/chat/  { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/chat/ { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # 연락처
        location /v2/contacts { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/contacts { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # 지갑/체인
        location /api/wallet { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/chain/ { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # 메일
        location /api/mail/ { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # 퀴즈/사용자검색
        location /api/bible/ { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/users/ { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # WebSocket (메신저 실시간)
        location /ws/chat {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # 파일 업로드/서빙
        location /uploads/ { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /api/upload { proxy_pass http://127.0.0.1:7730; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # ── 나머지: CrownyOS Canvas GUI (:17777) ──
        location / {
            proxy_pass http://127.0.0.1:17777;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;

            # CrownyOS 인증을 CrownyTVM으로 연동
            sub_filter_once off;
            sub_filter "id=\"login-email\" type=\"email\" placeholder=\"your@email.com\"" "id=\"login-email\" type=\"text\" placeholder=\"ID or Email\"";
            sub_filter ">이메일</label>" ">ID or Email</label>";
            sub_filter "function isValidEmail(email) {" "function isValidEmail(email) { if(!email.includes('@')) return true;";
            sub_filter "<!-- OAuth 로그인 -->" "<!-- OAuth removed --><div style=\"display:none!important\">";
            sub_filter "<!-- 회원가입 폼 -->" "</div><!-- /OAuth --><!-- 회원가입 폼 -->";
            sub_filter "</body>" "<script>
(function(){
  window.oauthLogin=function(){};
  var _l=window.tryLogin;
  window.tryLogin=async function(){
    var e=document.getElementById('login-email'),p=document.getElementById('login-password');
    if(!e||!p){if(_l)_l();return;}
    var id=e.value.trim(),pw=p.value;
    if(!id||!pw)return;
    try{
      var r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:id,password:pw})});
      var d=await r.json();
      if(d.token){localStorage.setItem('crowny_token',d.token);localStorage.setItem('crowny_user',JSON.stringify({username:d.username,email:d.email||d.username+'@crowny.org'}));setTimeout(function(){location.reload()},500);return;}
      if(d.error)alert(d.error);
    }catch(x){if(_l)_l();}
  };
  var _r=window.tryRegister;
  window.tryRegister=async function(){
    var e=document.getElementById('register-email'),n=document.getElementById('register-nickname'),p=document.getElementById('register-password');
    if(!e||!p){if(_r)_r();return;}
    var un=e.value.trim();if(un.includes('@'))un=un.split('@')[0];
    try{
      var r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:p.value,displayName:n?n.value.trim():un})});
      var d=await r.json();
      if(d.success){localStorage.setItem('crowny_token',d.token||'');setTimeout(function(){location.reload()},1000);return;}
      if(d.error)alert(d.error);
    }catch(x){if(_r)_r();}
  };
})();
</script></body>";
        }
    }

    # ─── crowny.org: Consumer (CrownyTVM) ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crowny.org;

        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        client_max_body_size 50M;

        location / {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
