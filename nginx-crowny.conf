# ═══════════════════════════════════════════════════════════════
# Crowny Platform — nginx reverse proxy (통합 GUI)
#
# 구조:
#   인터넷 → 공유기(:443,:80) → nginx(:8443,:8080) → CrownyTVM (:7730)
#     crownybus.com → CrownyTVM (:7730) — 통합 GUI
#     crowny.org    → CrownyTVM (:7730) — 동일
#
# DNS:
#   crownybus.com  A  112.144.147.144
#   crowny.org     A  112.144.147.144
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /opt/homebrew/var/log/nginx/error.log warn;
pid /opt/homebrew/var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_host"';
    access_log /opt/homebrew/var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ─── HTTP → HTTPS 리다이렉트 ───
    server {
        listen 8080;
        server_name crownybus.com crowny.org;

        location /.well-known/acme-challenge/ {
            root /opt/homebrew/var/www/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS: crownybus.com — 통합 GUI ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crownybus.com;

        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # 모든 요청 → CrownyTVM (:7730)
        location / {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # ─── HTTPS: crowny.org ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crowny.org;

        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # 모든 요청 → CrownyTVM (:7730)
        location / {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
