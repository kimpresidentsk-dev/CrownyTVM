# ═══════════════════════════════════════════════════════════════
# Crowny Platform — nginx reverse proxy (dual domain, 통합 인증)
#
# 구조:
#   인터넷 → 공유기(:443,:80) → nginx(:8443,:8080) → backend
#     crownybus.com
#       /api/login, /api/register, /api/mail/* → CrownyTVM (:7730)
#       나머지 /                               → CrownyOS  (:17777)
#     crowny.org → CrownyTVM (:7730)
#
# 설치:
#   1. brew install nginx certbot (macOS)
#   2. cp nginx-crowny.conf /opt/homebrew/etc/nginx/nginx.conf
#   3. 공유기 포트포워딩: 443→8443, 80→8080
#   4. nginx
#   5. certbot certonly --webroot -w /opt/homebrew/var/www/letsencrypt \
#        -d crownybus.com -d crowny.org
#   6. nginx -s reload
#
# DNS (hosting.kr, NS를 hosting.co.kr로 복원 후):
#   crownybus.com  A  112.144.147.144
#   crowny.org     A  112.144.147.144
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /opt/homebrew/var/log/nginx/error.log warn;
pid /opt/homebrew/var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_host"';
    access_log /opt/homebrew/var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ─── HTTP (포트 8080) ───
    # ACME 챌린지 + HTTPS 리다이렉트
    server {
        listen 8080;
        server_name crownybus.com crowny.org;

        # Let's Encrypt ACME 챌린지
        location /.well-known/acme-challenge/ {
            root /opt/homebrew/var/www/letsencrypt;
        }

        # 나머지는 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS: crownybus.com (통합 인증 + CrownyOS) ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crownybus.com;

        # SSL — Let's Encrypt (crownybus.com + crowny.org)
        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 보안 헤더
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # ── 통합 인증 API → CrownyTVM (:7730) ──
        location /api/login {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/register {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/profile {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/verify-email {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 세션 확인 (CrownyOS 호환) → CrownyTVM (:7730) ──
        location /v2/auth/me {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 통합 메일 API → CrownyTVM (:7730) ──
        location /api/mail/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 메신저 API (v2 호환) → CrownyTVM (:7730) ──
        location /v2/chat/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v2/contacts {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 메신저 API → CrownyTVM (:7730) ──
        location /api/chat/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 지갑/체인/연락처/퀴즈 API → CrownyTVM (:7730) ──
        location /api/wallet {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/chain/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/contacts {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/bible/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/users/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket (채팅) → CrownyTVM (:7730) ──
        location /ws/chat {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── 업로드 파일 → CrownyTVM (:7730) ──
        location /uploads/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/upload {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 나머지 → CrownyOS (:17777) ──
        location / {
            proxy_pass http://127.0.0.1:17777;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;

            # OAuth 섹션 완전 제거 + CrownyTVM 통합 인증
            sub_filter_once off;

            # 이메일 전용 → 아이디/이메일 겸용 입력필드로 변경
            sub_filter "id=\"login-email\" type=\"email\" placeholder=\"your@email.com\"" "id=\"login-email\" type=\"text\" placeholder=\"아이디 또는 이메일\"";
            sub_filter ">이메일</label>" ">아이디 또는 이메일</label>";

            # 이메일 validation 우회
            sub_filter "function isValidEmail(email) {" "function isValidEmail(email) { if(!email.includes('@')) return true;";

            # OAuth 전체 블록 숨기기 ("또는" 구분선 + 3개 버튼 컨테이너)
            sub_filter "<!-- OAuth 로그인 -->" "<!-- OAuth 제거됨 --><div style=\"display:none!important\">";
            sub_filter "<!-- 회원가입 폼 -->" "</div><!-- /OAuth 제거 --><!-- 회원가입 폼 -->";

            # CrownyTVM 통합 인증 스크립트 주입
            sub_filter "</body>" "<script>
/* CrownyTVM 통합 인증 — crownybus.com */
(function(){
  window.oauthLogin = function(p){ if(typeof showToast==='function') showToast(p+' 로그인은 지원되지 않습니다.'); };

  // tryLogin → CrownyTVM API
  const _orig = window.tryLogin;
  window.tryLogin = async function() {
    const emailEl = document.getElementById('login-email');
    const pwEl = document.getElementById('login-password');
    if (!emailEl || !pwEl) { if(_orig) _orig(); return; }
    const id = emailEl.value.trim();
    const pw = pwEl.value;
    if (!id || !pw) { if(typeof showAuthMessage==='function') showAuthMessage('아이디와 비밀번호를 입력하세요','error'); return; }
    try {
      const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:id,password:pw})});
      const d = await r.json();
      if(d.token){
        localStorage.setItem('crowny_token',d.token);
        localStorage.setItem('crowny_user',JSON.stringify({username:d.username,email:d.email||d.username+'@crowny.org'}));
        if(typeof showToast==='function') showToast('로그인 성공!');
        setTimeout(()=>location.reload(),500);
        return;
      }
      if(d.error){ if(typeof showAuthMessage==='function') showAuthMessage(d.error,'error'); else alert(d.error); }
    }catch(e){ console.warn('[CrownyTVM] login:',e); if(_orig) _orig(); }
  };

  // tryRegister → CrownyTVM API
  const _origReg = window.tryRegister;
  window.tryRegister = async function() {
    const emailEl = document.getElementById('register-email');
    const nickEl = document.getElementById('register-nickname');
    const pwEl = document.getElementById('register-password');
    const pw2El = document.getElementById('register-password-confirm');
    if (!emailEl || !pwEl) { if(_origReg) _origReg(); return; }
    const email = emailEl.value.trim();
    const nick = nickEl ? nickEl.value.trim() : '';
    const pw = pwEl.value;
    const pw2 = pw2El ? pw2El.value : pw;
    if (pw !== pw2) { if(typeof showAuthMessage==='function') showAuthMessage('비밀번호가 일치하지 않습니다','error'); return; }
    const username = email.includes('@') ? email.split('@')[0] : email;
    try {
      const r = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:pw,displayName:nick||username})});
      const d = await r.json();
      if(d.success){
        if(typeof showToast==='function') showToast('가입 완료! '+d.email);
        localStorage.setItem('crowny_token',d.token||'');
        setTimeout(()=>location.reload(),1000);
        return;
      }
      if(d.error){ if(typeof showAuthMessage==='function') showAuthMessage(d.error,'error'); else alert(d.error); }
    }catch(e){ console.warn('[CrownyTVM] register:',e); if(_origReg) _origReg(); }
  };
})();
</script></body>";
        }
    }

    # ─── HTTPS: crowny.org → CrownyTVM (:7730) ───
    server {
        listen 8443 ssl;
        http2 on;
        server_name crowny.org;

        # SSL — Let's Encrypt (crownybus.com + crowny.org)
        ssl_certificate     /Users/ef/crowny-data/certs/letsencrypt/fullchain.pem;
        ssl_certificate_key /Users/ef/crowny-data/certs/letsencrypt/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 보안 헤더
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # API → CrownyTVM Node.js
        location /api/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket (채팅 실시간)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # WebSocket → CrownyTVM
        location /ws/ {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # 정적 파일 → CrownyTVM
        location / {
            proxy_pass http://127.0.0.1:7730;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
