<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CrownyCore</title>
  <link rel="stylesheet" href="css/코어.css">
  <script src="js/d3.min.js"></script>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="logo">Crowny<em>Core</em></div>
  <div class="hdr-r">
    <span id="notifBadge" class="badge 미인지" style="cursor:pointer;display:none" title="알림">0</span>
    <span id="badge" class="badge 미인지">—</span>
    <span id="sel" style="font-size:10px;color:var(--text-3)"></span>
  </div>
</header>

<!-- Left Nav Rail -->
<nav class="nav" id="mainNav">
  <button class="nav-btn active" data-v="home"><span class="ic">⌂</span><span class="label">홈</span></button>
  <button class="nav-btn" data-v="dashboard"><span class="ic">◉</span><span class="label">대시보드</span></button>
  <button class="nav-btn" data-v="graph"><span class="ic">≡</span><span class="label">작업 공간</span></button>
  <button class="nav-btn" data-v="decide"><span class="ic">◎</span><span class="label">의사결정</span></button>
  <div class="nav-sep"></div>
  <button class="nav-btn" data-v="tmpl"><span class="ic">◧</span><span class="label">프로젝트</span></button>
  <button class="nav-btn" data-v="causal"><span class="ic">⇥</span><span class="label">인과추론</span></button>
  <button class="nav-btn" data-v="kps"><span class="ic">∿</span><span class="label">차트분석</span></button>
  <div class="nav-sep"></div>
  <button class="nav-btn" data-v="life"><span class="ic">☀</span><span class="label">개인</span></button>
  <button class="nav-btn" data-v="family"><span class="ic">♡</span><span class="label">가정</span></button>
  <button class="nav-btn" data-v="startup"><span class="ic">▪</span><span class="label">스타트업</span></button>
  <button class="nav-btn" data-v="church"><span class="ic">◌</span><span class="label">비영리</span></button>
  <button class="nav-btn" data-v="enterprise"><span class="ic">◇</span><span class="label">기업</span></button>
  <button class="nav-btn" data-v="city"><span class="ic">▣</span><span class="label">관제</span></button>
  <div class="nav-sep"></div>
  <button class="nav-btn" data-v="create"><span class="ic">+</span><span class="label">만들기</span></button>
  <button class="nav-btn" data-v="search"><span class="ic">⌕</span><span class="label">찾기</span></button>
  <button class="nav-btn" data-v="stats"><span class="ic">≡</span><span class="label">통계</span></button>
</nav>

<!-- Center Canvas -->
<main class="canvas">
  <div class="canvas-bar">
    <span class="canvas-title" id="viewTitle">셀 그래프</span>
    <div style="margin-left:auto;display:flex;gap:4px">
      <button class="btn" id="sampleBtn">예제 넣기</button>
      <button class="btn" id="refreshBtn">새로고침</button>
    </div>
  </div>
  <div class="canvas-body">

    <!-- Welcome View (첫 화면) -->
    <div class="view active" id="v_home" style="align-items:center;justify-content:center">
      <h2 style="font-size:16px;font-weight:700;letter-spacing:-0.03em">CrownyCore</h2>
      <p style="font-size:12px;color:var(--text-2);max-width:400px;text-align:center;line-height:1.6">무엇을 하고 싶나요?</p>
      <div class="welcome-grid">
        <div class="welcome-card" id="w_biz"><span class="ic">▪</span><span class="label">비즈니스</span><span class="sub">매출·고객·재고·HR</span></div>
        <div class="welcome-card" id="w_ent"><span class="ic">▫</span><span class="label">엔터테인먼트</span><span class="sub">콘텐츠·커뮤니티·이벤트</span></div>
        <div class="welcome-card" id="w_church"><span class="ic">◌</span><span class="label">교회</span><span class="sub">교인·소그룹·기도·예배</span></div>
      </div>
      <div class="welcome-grid" style="margin-top:8px">
        <div class="welcome-card" id="w_nation"><span class="ic">◧</span><span class="label">프로젝트</span><span class="sub">191개 템플릿</span></div>
        <div class="welcome-card" id="w_churchdemo"><span class="ic">◌</span><span class="label">교회 데모</span><span class="sub">교인20+헌금50</span></div>
        <div class="welcome-card" id="w_decide"><span class="ic">◎</span><span class="label">결정 도와줘</span><span class="sub">AI 의사결정</span></div>
      </div>
    </div>

    <!-- Dashboard View -->
    <div class="view" id="v_dashboard" style="padding:14px;gap:12px;overflow:auto">
      <div id="dashboardApp"></div>
    </div>

    <!-- Workspace View -->
    <div class="view" id="v_graph" style="gap:0">
      <!-- 상단: 프로젝트 컨텍스트 + 요약 -->
      <div id="wsContext" style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:10px;min-height:40px">
        <span id="wsProjectName" style="font-weight:600;font-size:12px">프로젝트를 선택하세요</span>
        <div id="wsStats" style="display:flex;gap:8px;margin-left:auto;font-size:10px;color:var(--text-3)"></div>
      </div>
      <!-- 중앙: 리스트 + 그래프 분할 -->
      <div style="flex:1;display:flex;overflow:hidden">
        <!-- 왼쪽: 셀 리스트 -->
        <div id="wsList" style="width:220px;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);display:flex;flex-direction:column">
          <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px">
            <input id="wsFilter" placeholder="셀 필터..." style="flex:1;font-size:10px">
            <button class="btn" id="wsAddCell" style="font-size:10px;padding:2px 6px" title="새 셀 추가">+</button>
          </div>
          <div id="wsCellList" style="flex:1;overflow-y:auto"></div>
        </div>
        <!-- 오른쪽: 그래프 -->
        <div class="graph-wrap" id="graphC" style="flex:1"></div>
      </div>
      <!-- 하단: 액션 바 -->
      <div style="padding:6px 14px;border-top:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:6px;font-size:10px">
        <span style="color:var(--text-3)">작업:</span>
        <button class="btn" id="wsAddClaim" style="font-size:10px;padding:2px 8px">주장 추가</button>
        <button class="btn" id="wsRunDecide" style="font-size:10px;padding:2px 8px">의사결정</button>
        <button class="btn" id="wsDetectCausal" style="font-size:10px;padding:2px 8px">인과 분석</button>
        <button class="btn" id="wsExport" style="font-size:10px;padding:2px 8px">내보내기</button>
        <div style="margin-left:auto;color:var(--text-3)" id="wsGuide">셀을 클릭하면 오른쪽에 상세 정보가 나타납니다</div>
      </div>
    </div>

    <!-- Decide View -->
    <div class="view" id="v_decide" style="padding:14px;gap:12px"></div>

    <!-- Templates View -->
    <div class="view" id="v_tmpl" style="padding:14px;gap:12px;overflow:auto"></div>

    <!-- Causal View -->
    <div class="view" id="v_causal" style="padding:14px;gap:12px;overflow:auto"></div>

    <!-- KPS View -->
    <div class="view" id="v_kps" style="padding:14px">
      <div class="card" style="flex:1;display:flex;flex-direction:column">
        <div class="card-h"><span class="card-t">KPS EMA 9/21/50</span></div>
        <div id="chartC" style="flex:1;min-height:300px"></div>
      </div>
    </div>

    <!-- Life View -->
    <div class="view" id="v_life" style="padding:14px;gap:12px;overflow:auto">
      <div id="lifeApp"></div>
    </div>

    <!-- Family View -->
    <div class="view" id="v_family" style="padding:14px;gap:12px;overflow:auto">
      <div id="familyApp"></div>
    </div>

    <!-- Startup View -->
    <div class="view" id="v_startup" style="padding:14px;gap:12px;overflow:auto">
      <div id="startupApp"></div>
    </div>

    <!-- Church View -->
    <div class="view" id="v_church" style="padding:14px;gap:12px;overflow:auto">
      <div id="churchApp"></div>
    </div>

    <!-- Enterprise View -->
    <div class="view" id="v_enterprise" style="padding:14px;gap:12px;overflow:auto">
      <div id="enterpriseApp"></div>
    </div>

    <!-- City View -->
    <div class="view" id="v_city" style="padding:14px;gap:12px;overflow:auto">
      <div id="cityApp"></div>
    </div>

    <!-- Create View -->
    <div class="view" id="v_create" style="padding:14px;gap:12px">
      <div class="card">
        <div class="card-h"><span class="card-t">새 셀 만들기</span></div>
        <form id="cellForm" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-width:400px">
          <input name="name" placeholder="이름 (예: BTC)" required>
          <select name="type"><option value="0">종류 선택</option><option value="1">숫자</option><option value="3">글자</option><option value="8">기능</option></select>
          <input name="content" placeholder="값 (예: 67000)">
          <select name="layer"><option value="0">기본</option><option value="1">도메인</option><option value="2">결정</option><option value="3">인식</option></select>
          <label style="font-size:10px;display:flex;align-items:center;gap:3px"><input type="checkbox" name="confirmed"> 확실한 정보</label>
          <button type="submit" class="btn btn-p">만들기</button>
        </form>
      </div>
      <div class="card">
        <div class="card-h"><span class="card-t">새 주장 만들기</span><span style="font-size:9px;color:var(--text-3);margin-left:8px">"누가 무엇을 어떻게" 형식</span></div>
        <form id="claimForm" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-width:400px">
          <input name="subject" placeholder="누가 (BTC)" required>
          <input name="predicate" placeholder="무엇을 (추세)" required>
          <input name="object" placeholder="어떻게 (상승)" required>
          <select name="layer"><option value="0">기본</option><option value="1">도메인</option><option value="2">결정</option></select>
          <div></div>
          <button type="submit" class="btn btn-p">추가</button>
        </form>
      </div>
    </div>

    <!-- Search View -->
    <div class="view" id="v_search" style="padding:14px;gap:12px">
      <form id="searchForm" style="display:flex;gap:6px;max-width:360px">
        <input id="searchQ" placeholder="셀이나 주장을 검색..." style="flex:1">
        <button type="submit" class="btn btn-p">찾기</button>
      </form>
      <div id="searchR" style="display:flex;flex-direction:column;gap:4px"></div>
    </div>

    <!-- Stats View -->
    <div class="view" id="v_stats" style="padding:14px;gap:12px"></div>
  </div>
</main>

<!-- Right Detail Panel -->
<aside class="detail" id="detailPanel">
  <div class="detail-section" id="detailContent">
    <div class="detail-title">상세 정보</div>
    <p style="color:var(--text-3);font-size:11px">그래프에서 동그라미를 클릭하면<br>여기에 자세한 정보가 나타나요</p>
  </div>
</aside>

<div id="toast" class="toast"></div>

<script type="module" src="js/앱.js"></script>
</body>
</html>
